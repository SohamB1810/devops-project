name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}

    - name: Build Docker Image
      run: docker build -t soham1810/test-image:latest ./app

    - name: Push Docker Image
      run: docker push soham1810/test-image:latest

    - name: Test API Health
      run: |
        docker run -d --name test-app -p 3000:3000 soham1810/test-image:latest
        sleep 5
        curl --fail http://localhost:3000/health || exit 1
        docker stop test-app
        docker rm test-app

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG_B64 }}" | base64 --decode > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Deploy to Kubernetes
      run: |
        kubectl set image deployment/devops-app \
          devops-app=soham1810/test-image:latest
        kubectl rollout status deployment/devops-app --timeout=60s

    - name: Verify Deployment
      run: kubectl get pods -l app=devops-app
